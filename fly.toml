# Fly.io deployment configuration
app = "dropshipping-ai-automation"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  SYSTEM_DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false  # Keep running for background jobs
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/app/data"

[mounts]
  source = "dropshipping_data"
  destination = "/app/data"
